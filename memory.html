<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory - Valentine's Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #E6D5F5 0%, #D9C5ED 50%, #C8B4E0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            animation: slideIn 0.6s ease;
        }

        h1 {
            color: #c41e3a;
            font-size: 3em;
            margin-bottom: 40px;
            font-family: 'Great Vibes', cursive;
            font-weight: 400;
        }

        .collage-box {
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e9 100%);
            border: 3px solid #ff69b4;
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            box-shadow: 0 10px 30px rgba(196, 30, 58, 0.2);
            position: relative;
            overflow: hidden;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .collage-container {
            position: relative;
            width: 100%;
            min-height: 320px;
            display: grid;
            grid-auto-flow: column;
            grid-template-rows: repeat(2, auto);
            justify-content: center;
            align-content: center;
            row-gap: 24px;
            column-gap: 24px;
        }

        .collage-photo {
            position: relative;
            width: 120px;
            height: 150px;
            background: white;
            border: 8px solid white;
            border-radius: 5px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3em;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transform-origin: center;
            transition: transform 0.3s ease;
        }

        .collage-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .memory-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .memory-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .memory-modal-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        .memory-modal img,
        .memory-modal video {
            display: block;
            max-width: 90vw;
            max-height: 90vh;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .memory-modal-close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            color: #fff;
            cursor: pointer;
            z-index: 1001;
            font-family: Arial, sans-serif;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(var(--rotation, 0deg));
            }
            50% {
                transform: translateY(-15px) rotate(var(--rotation, 0deg));
            }
        }

        .memory-text {
            color: #555;
            font-size: 1.2em;
            line-height: 1.8;
            margin: 30px 0;
            font-weight: 400;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-family: 'Playfair Display', serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff1744, #ff6e40);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(255, 23, 68, 0.4);
        }

        .btn-secondary {
            background: rgba(196, 30, 58, 0.1);
            color: #c41e3a;
            border: 2px solid #c41e3a;
        }

        .btn-secondary:hover {
            background: rgba(196, 30, 58, 0.2);
            transform: scale(1.05);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Memories</h1>

        <div class="collage-box">
            <div class="collage-container">
                <div class="collage-photo" style="background-image: url('1.jpg');" data-type="image" data-src="1.jpg"></div>
                <div class="collage-photo" style="background-image: url('2.jpg');" data-type="image" data-src="2.jpg"></div>
                <div class="collage-photo" style="background-image: url('3.jpg');" data-type="image" data-src="3.jpg"></div>
                <div class="collage-photo" style="background-image: url('4.jpg');" data-type="image" data-src="4.jpg"></div>
                <div class="collage-photo" style="background-image: url('5.jpg');" data-type="image" data-src="5.jpg"></div>
                <div class="collage-photo" style="background-image: url('7.jpg');" data-type="image" data-src="7.jpg"></div>
                <div class="collage-photo" style="background-image: url('8.jpg');" data-type="image" data-src="8.jpg"></div>
                <div class="collage-photo" style="background-image: url('9.jpg');" data-type="image" data-src="9.jpg"></div>
                <div class="collage-photo" style="background-image: url('10.jpg');" data-type="image" data-src="10.jpg"></div>
                <div class="collage-photo collage-video" data-type="video" data-src="6.mp4">
                    <video src="6.mp4" autoplay muted loop playsinline></video>
                </div>
            </div>
        </div>

        <div id="memory-modal" class="memory-modal">
            <div class="memory-modal-content">
                <span class="memory-modal-close">&times;</span>
                <img id="memory-modal-image" alt="Memory" style="display: none;">
                <video id="memory-modal-video" controls style="display: none;"></video>
            </div>
        </div>

        <div class="memory-text">
            <p>Our memories together are the most precious gift.</p>
            <p>Every moment, every laugh, every tear shared creates a beautiful story that will stay in our hearts forever.</p>
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="goBack()">Back to Gifts</button>
        </div>
    </div>

    <script>
        function goBack() {
            window.location.href = 'surprise.html';
        }

        // Randomize the order and slightly rotate memories in a 2-row grid
        // so they feel scattered, with small gaps but no overlap.
        (function layoutCollage() {
            const photos = Array.from(document.querySelectorAll('.collage-photo'));
            if (!photos.length) return;

            const shuffled = [...photos].sort(() => Math.random() - 0.5);

            shuffled.forEach((photo, index) => {
                photo.style.order = index + 1;

                const rotate = (Math.random() * 10) - 5; // -5deg to 5deg
                const offsetX = (Math.random() * 8) - 4; // -4px to 4px
                const offsetY = (Math.random() * 8) - 4; // -4px to 4px
                photo.style.transform = `translate(${offsetX}px, ${offsetY}px) rotate(${rotate}deg)`;
            });
        })();

        const modal = document.getElementById('memory-modal');
        const modalImage = document.getElementById('memory-modal-image');
        const modalVideo = document.getElementById('memory-modal-video');
        const closeBtn = document.querySelector('.memory-modal-close');

        document.querySelectorAll('.collage-photo').forEach(photo => {
            photo.addEventListener('click', () => {
                const type = photo.dataset.type || 'image';
                const src = photo.dataset.src;

                if (!src) return;

                if (type === 'video') {
                    modalImage.style.display = 'none';
                    modalVideo.style.display = 'block';
                    modalVideo.src = src;
                    modalVideo.play();
                } else {
                    modalVideo.pause();
                    modalVideo.removeAttribute('src');
                    modalVideo.load();
                    modalVideo.style.display = 'none';
                    modalImage.style.display = 'block';
                    modalImage.src = src;
                }

                modal.classList.add('show');
            });
        });

        function closeModal() {
            modal.classList.remove('show');
            modalVideo.pause();
        }

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('show')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
