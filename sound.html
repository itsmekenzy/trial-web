<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Song - Valentine's Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #E6D5F5 0%, #D9C5ED 50%, #C8B4E0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.96);
            padding: 60px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1100px;
            width: 100%;
            animation: slideIn 0.6s ease;
        }

        h1 {
            color: #c41e3a;
            font-size: 3em;
            margin-bottom: 10px;
            font-family: 'Great Vibes', cursive;
            font-weight: 400;
        }

        h2 {
            color: #c41e3a;
            font-size: 1.6em;
            margin-bottom: 30px;
        }

        .heart-icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: heartBeat 1.6s ease-in-out infinite;
        }

        .message {
            color: #555;
            font-size: 1.1em;
            line-height: 1.9;
            margin: 20px auto 35px;
            max-width: 640px;
        }

        .audio-card {
            margin: 0 auto 40px;
            padding: 36px 48px;
            border-radius: 22px;
            background: linear-gradient(135deg, #ff69b4 0%, #ff1744 100%);
            box-shadow: 0 18px 48px rgba(196, 30, 58, 0.6);
            color: #fff;
            display: grid;
            grid-template-columns: 0.9fr 1.4fr;
            grid-template-rows: auto auto;
            column-gap: 40px;
            row-gap: 20px;
            align-items: center;
            justify-items: center;
        }

        .audio-flower {
            grid-column: 1;
            grid-row: 1;
            max-width: 90%;
            height: auto;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
        }

        .audio-qr {
            grid-column: 1;
            grid-row: 2;
            max-width: 70%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
            background: #fff;
            padding: 10px;
        }

        .audio-video {
            grid-column: 2;
            grid-row: 1 / span 2;
            width: 100%;
            max-width: 520px;
            border-radius: 20px;
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.4);
            background: #000;
            object-fit: cover;
        }

        .audio-title {
            font-size: 1.4em;
            margin-bottom: 8px;
        }

        .audio-subtitle {
            font-size: 0.95em;
            opacity: 0.85;
            margin-bottom: 18px;
        }

        audio {
            width: 100%;
            max-width: 520px;
            outline: none;
        }

        .note {
            font-size: 0.9em;
            color: #777;
            margin-top: 8px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 35px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 32px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-family: 'Playfair Display', serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff1744, #ff6e40);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 23, 68, 0.4);
        }

        .btn-secondary {
            background: rgba(196, 30, 58, 0.08);
            color: #c41e3a;
            border: 2px solid #c41e3a;
        }

        .btn-secondary:hover {
            background: rgba(196, 30, 58, 0.16);
            transform: scale(1.03);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes heartBeat {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart-icon">🎵</div>
        <h1>Our Song</h1>
        <h2>This is how I hear you in my heart</h2>

        <div class="audio-card">
            <img src="flower.png" alt="Flower" class="audio-flower">
            <img src="qrcode.png" alt="QR code" class="audio-qr">
            <video class="audio-video" src="statue.mp4" autoplay muted loop playsinline></video>
        </div>

        <div class="button-group">
            <button class="btn-secondary" onclick="goBack()">Back to Gifts</button>
        </div>
    </div>

    <script>
        function goBack() {
            window.location.href = 'surprise.html';
        }

    </script>
</body>
</html>
