<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Valentine's Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #E6D5F5 0%, #D9C5ED 50%, #C8B4E0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 100%;
            animation: slideIn 0.6s ease;
        }

        h1 {
            color: #c41e3a;
            font-size: 3.5em;
            margin-bottom: 30px;
            font-family: 'Great Vibes', cursive;
            font-weight: 400;
        }

        .heart-animation {
            font-size: 6em;
            display: inline-block;
            animation: heartBeat 1.5s ease-in-out infinite;
            margin: 30px 0;
        }

        .message {
            color: #555;
            font-size: 1.3em;
            line-height: 2;
            margin: 30px 0;
            font-weight: 400;
        }

        .message p {
            margin-bottom: 20px;
        }

        .special-text {
            color: #c41e3a;
            font-size: 1.5em;
            font-style: italic;
            margin: 30px 0;
            font-family: 'Great Vibes', cursive;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-family: 'Playfair Display', serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff1744, #ff6e40);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(255, 23, 68, 0.4);
        }

        .btn-secondary {
            background: rgba(196, 30, 58, 0.1);
            color: #c41e3a;
            border: 2px solid #c41e3a;
        }

        .btn-secondary:hover {
            background: rgba(196, 30, 58, 0.2);
            transform: scale(1.05);
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confetti 3s ease-in-out forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes heartBeat {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        @keyframes confetti {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .decorative-hearts {
            position: fixed;
            font-size: 2em;
            opacity: 0.3;
            pointer-events: none;
        }

        .present-section {
            margin: 40px 0;
            padding: 50px 60px;
            background: rgba(255, 23, 68, 0.05);
            border-radius: 0px;
            border: 2px solid rgba(196, 30, 58, 0.2);
        }

        .present-title {
            color: #c41e3a;
            font-size: 3.5em;
            margin-bottom: 40px;
            font-family: 'Great Vibes', cursive;
        }

        .boxes-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: nowrap;
            margin-top: 20px;
        }

        .gift-box-item {
            background: linear-gradient(135deg, #ff69b4 0%, #ff1744 100%);
            width: 350px;
            height: 280px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(196, 30, 58, 0.3);
            flex-direction: column;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 15px;
        }

        .gift-box-item:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 25px rgba(196, 30, 58, 0.5);
        }

        .gift-box-icon {
            font-size: 6em;
            margin-bottom: 10px;
        }

        .gift-box-label {
            font-size: 1.8em;
            font-family: 'Playfair Display', serif;
        }

        .gift-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            max-width: 500px;
            width: 90%;
            animation: popIn 0.5s ease;
            text-align: center;
        }

        .gift-modal.show {
            display: block;
        }

        .gift-modal h2 {
            color: #c41e3a;
            font-size: 2.2em;
            margin-bottom: 20px;
        }

        .gift-modal p {
            color: #555;
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .gift-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .gift-overlay.show {
            display: block;
        }

        .close-gift-btn {
            background: #c41e3a;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .close-gift-btn:hover {
            background: #a01729;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart-animation">💕</div>

        <div class="present-title">Present for You</div>
        <div class="boxes-container">
            <div class="gift-box-item" onclick="window.location.href='memory.html'">
                <img src="memory.png" alt="Love" style="width: 60%; height: auto; object-fit: contain; border-radius: 5px; display: block; aspect-ratio: 3/4; background: linear-gradient(135deg, #ff69b4 0%, #ff1744 100%); padding: 15px;">
            </div>
            <div class="gift-box-item" onclick="window.location.href='sound.html'">
                <img src="sound.png" alt="Hope" style="width: 60%; height: auto; object-fit: contain; border-radius: 5px; display: block; aspect-ratio: 3/4; background: linear-gradient(135deg, #ff69b4 0%, #ff1744 100%); padding: 40px;">
            </div>
            <div class="gift-box-item" onclick="window.location.href='letter.html'">
                <img src="letter.png" alt="Joy" style="width: 60%; height: auto; object-fit: contain; border-radius: 5px; display: block; aspect-ratio: 3/4; background: linear-gradient(135deg, #ff69b4 0%, #ff1744 100%); padding: 40px;">
            </div>
        </div>
    </div>

    <div class="gift-overlay" id="giftOverlay"></div>

    <div class="gift-modal" id="giftModal">
        <h2 id="giftTitle">Gift</h2>
        <p id="giftMessage">Here's your special gift!</p>
        <button class="close-gift-btn" onclick="closeGift()">Close</button>
    </div>

    <script>
        const giftMessages = {
            1: {
                title: '💝 Love',
                message: 'You are loved more than you know. Your presence makes the world a better place. Remember to love yourself as much as you deserve to be loved.'
            },
            2: {
                title: '✨ Hope',
                message: 'Hope is the light that guides us through difficult times. Every day brings new possibilities and chances to create beautiful moments. Stay hopeful and believe in your dreams!'
            },
            3: {
                title: '🎁 Joy',
                message: 'Joy comes from the little moments we share with people we care about. Find joy in simple things, laugh often, and spread happiness wherever you go!'
            }
        };

        function openGift(giftNumber) {
            const gift = giftMessages[giftNumber];
            document.getElementById('giftTitle').textContent = gift.title;
            document.getElementById('giftMessage').textContent = gift.message;
            document.getElementById('giftModal').classList.add('show');
            document.getElementById('giftOverlay').classList.add('show');
            createConfetti();
        }

        function closeGift() {
            document.getElementById('giftModal').classList.remove('show');
            document.getElementById('giftOverlay').classList.remove('show');
        }

        document.getElementById('giftOverlay').addEventListener('click', closeGift);

        function celebrate() {
            createConfetti();
            alert('💕 Happy Valentine\'s Day! 💕\n\nHave a wonderful and love-filled day!');
        }

        function goBack() {
            window.location.href = 'valentines.html';
        }

        function createConfetti() {
            const colors = ['#FF1744', '#FF69B4', '#FF6E40', '#FFD700', '#FF69B4'];
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        // Auto create falling hearts on page load
        window.addEventListener('load', () => {
            const hearts = ['❤️', '💕', '💖', '💝', '💗'];
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'decorative-hearts';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = '-20px';
                heart.style.animation = `slideIn 4s linear forwards`;
                document.body.appendChild(heart);
                
                setTimeout(() => heart.remove(), 4000);
            }, 500);
        });
    </script>
</body>
</html>
